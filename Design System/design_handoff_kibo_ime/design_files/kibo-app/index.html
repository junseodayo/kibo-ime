<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kibo — App</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { height: 100%; }
  body {
    margin: 0;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 40px;
    background:
      radial-gradient(120% 90% at 50% -10%, var(--greige-100), var(--greige-200) 70%);
  }
  [data-theme] { }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="PhoneFrame.jsx"></script>
<script type="text/babel" src="KeyboardsScreen.jsx"></script>
<script type="text/babel" src="RemapScreen.jsx"></script>

<script type="text/babel" src="SettingsScreen.jsx"></script>
<script type="text/babel" src="App.jsx"></script>
<script type="text/babel" data-presets="react">
  const mount = () => {
    if (!window.KiboApp) { setTimeout(mount, 30); return; }
    ReactDOM.createRoot(document.getElementById("root")).render(<window.KiboApp />);
  };
  mount();
</script>
</body>
</html>
