<!-- @dsCard group="Kibo App" viewport="1980x940" name="시안 — 툴바 · 설정 · 온스크린 · 클립보드" subtitle="일본어 변환 툴바 · IME 설정 · 온스크린 폴백 · 클립보드 관리" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kibo — 시안</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; }
  body {
    min-height: 100vh; box-sizing: border-box;
    background: radial-gradient(120% 90% at 50% -10%, var(--greige-100), var(--greige-200) 70%);
  }
  .stage { width: max-content; min-width: 100%; box-sizing: border-box; padding: 56px 64px; }
  .rail { display: flex; align-items: flex-start; gap: 56px; }
  .frame { flex: none; display: flex; flex-direction: column; gap: 16px; }
  .cap { font-family: var(--font-sans); }
  .cap .t { font-size: 19px; font-weight: 800; letter-spacing: -0.02em; color: var(--greige-900); }
  .cap .d { font-size: 14px; color: var(--greige-700); margin-top: 3px; }
  .kb-cands::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div class="stage">
  <div class="rail" id="root"></div>
</div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="icons.jsx?v=9"></script>
<script type="text/babel" src="PhoneFrame.jsx?v=9"></script>
<script type="text/babel" src="Toolbar.jsx?v=9"></script>
<script type="text/babel" src="ToolbarMockupScreen.jsx?v=9"></script>
<script type="text/babel" src="KeyboardSettingsScreen.jsx?v=9"></script>
<script type="text/babel" src="OnScreenKeyboardScreen.jsx?v=9"></script>
<script type="text/babel" src="ClipboardScreen.jsx?v=9"></script>
<script type="text/babel" data-presets="react">
  const HomeBar = () => (
    <div style={{ flex: "none", padding: "6px 0 8px" }}>
      <div style={{ height: 5, width: 134, background: "var(--text-strong)", opacity: 0.85, borderRadius: 3, margin: "0 auto" }} />
    </div>
  );
  function Mockups() {
    return (
      <React.Fragment>
        <div className="frame">
          <div className="cap"><div className="t">키보드 툴바</div><div className="d">일본어 변환 입력 + 도킹 툴바 (모드·기호·이모지·클립보드)</div></div>
          <PassportFrame theme="light">
            <StatusBar />
            <ToolbarMockupScreen />
            
          </PassportFrame>
        </div>
        <div className="frame">
          <div className="cap"><div className="t">키보드 설정</div><div className="d">언어 순서·전환키 · 앱별 언어 · 클립보드 (다크)</div></div>
          <PassportFrame theme="dark">
            <StatusBar dark />
            <KeyboardSettingsScreen />
            
          </PassportFrame>
        </div>
        <div className="frame">
          <div className="cap"><div className="t">온스크린 키보드</div><div className="d">물리 키 고장 시 비상 폴백 · 두벌식 소프트 키보드</div></div>
          <PassportFrame theme="light">
            <StatusBar />
            <OnScreenKeyboardScreen />
            
          </PassportFrame>
        </div>
        <div className="frame">
          <div className="cap"><div className="t">클립보드 관리</div><div className="d">복사 히스토리 + 텍스트 프리셋 · 고정·비번 제외 (다크)</div></div>
          <PassportFrame theme="dark">
            <StatusBar dark />
            <ClipboardScreen />
            
          </PassportFrame>
        </div>
      </React.Fragment>
    );
  }
  const mount = () => {
    if (!window.PassportFrame || !window.ToolbarMockupScreen || !window.KeyboardSettingsScreen || !window.OnScreenKeyboardScreen || !window.ClipboardScreen) { setTimeout(mount, 30); return; }
    ReactDOM.createRoot(document.getElementById("root")).render(<Mockups />);
  };
  mount();
</script>
</body>
</html>
